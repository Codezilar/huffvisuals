# Netlify Configuration File
# Automatically configure build and deployment settings

[build]
  command = "echo 'Static site, no build needed'"
  publish = "."
  functions = "functions"

# Environment variables
[env]
  NODE_ENV = "production"

# Redirects and rewrites
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Form handling (requires Netlify form attribute)
[[plugins]]
  package = "netlify-plugin-minify-html"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # CSP Header
    Content-Security-Policy = "default-src 'self'; script-src 'self' www.googletagmanager.com www.google-analytics.com; style-src 'self' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' www.google-analytics.com www.googletagmanager.com"
    
    # Security Headers
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Performance
    Cache-Control = "public, max-age=3600"

# Cache Control
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.@(jpg|jpeg|png|gif|svg|ico|webp)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Compression
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# Error page
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
  force = true

# Context: Production
[context.production]
  command = "echo 'Production build'"
  
  [context.production.environment]
    NODE_ENV = "production"

# Context: Preview
[context.preview]
  command = "echo 'Preview build'"

# Context: Deploy-Preview
[context.deploy-preview]
  command = "echo 'Deploy preview'"

# Ignore build logs
[build.processing]
  skip_processing = false
